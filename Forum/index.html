<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>ForumHub — Diễn đàn cộng đồng</title>
    <meta
      name="description"
      content="ForumHub — Nền tảng thảo luận và chia sẻ kiến thức trực tuyến. Chia sẻ, kết nối và học hỏi cùng cộng đồng."
    />
    <meta
      name="keywords"
      content="forum, cộng đồng, thảo luận, chia sẻ kiến thức, lập trình"
    />
    <meta name="author" content="ForumHub" />

    <!-- PWA -->
    <meta name="theme-color" content="#6366f1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="ForumHub" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/icons/icon-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/icons/icon-72x72.png"
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ForumHub — Diễn đàn cộng đồng" />
    <meta
      property="og:description"
      content="Nền tảng thảo luận và chia sẻ kiến thức trực tuyến dành cho cộng đồng."
    />
    <meta property="og:image" content="/icons/icon-512x512.png" />
    <meta property="og:locale" content="vi_VN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="ForumHub" />
    <meta name="twitter:description" content="Diễn đàn cộng đồng hiện đại" />

    <!-- Preconnect fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Highlight.js for Quill Syntax Highlighting (Must be before main bundle) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
      window.hljs = hljs;
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

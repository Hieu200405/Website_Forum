groups:
  - name: forum-backend
    interval: 15s
    rules:
      - alert: BackendDown
        expr: up{job="forum_backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend scrape failing for 1m"
          description: "Prometheus has not been able to scrape forum_backend for at least 1 minute."

      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status_code=~"5.."}[5m]))
            /
          sum(rate(http_requests_total[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "5xx rate > 5% over 5m"
          description: "Backend 5xx error ratio has exceeded 5% for the last 5 minutes."

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            sum by (le) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "p95 latency > 1s over 5m"
          description: "Backend p95 request latency has exceeded 1s for 5 minutes."
